<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bahamas Digital Twin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Cesium CDN -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <script type="module" crossorigin src="/assets/index-DQjlWaPm.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-JZTSDVVb.css">
</head>
<body>
    <div id="cesiumContainer"></div>
    <canvas id="wind-canvas" style="position: absolute; top:0; left:0; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: none;"></canvas>
    
    <div id="ui-panel" class="glass-panel">
        <header>
            <h1>Bahamas Digital Twin</h1>
            <p>Climate Change & NbS Scenarios</p>
        </header>

        <div class="control-group">
            <h3>Imagery & Terrain</h3>
            <div class="select-wrapper" style="margin-bottom: 16px;">
                <select id="base-layer-select">
                    <option value="google-3d" selected>Google Photorealistic</option>
                    <option value="google-sat">Google Maps Satellite</option>
                    <option value="google-hybrid">Google Maps Hybrid</option>
                    <option value="google-road">Google Maps Roadmap</option>
                    <option value="bing-aerial">Bing Maps Aerial</option>
                </select>
            </div>
            
            <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <div class="toggle-container" style="flex: 1; margin: 0; margin-right: 16px;">
                        <span class="toggle-label" style="font-weight: 600;">DEM Drape</span>
                        <label class="switch">
                            <input type="checkbox" id="dem-toggle">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <!-- 지형 강조 UI -->
                    <select id="slr-multi" style="width: auto; padding: 4px 8px; margin: 0;">
                        <option value="1">x1 Effect</option>
                        <option value="2">x2 Effect</option>
                        <option value="3">x3 Effect</option>
                        <option value="4">x4 Effect</option>
                    </select>
                </div>
                
                <!-- DEM 레전드 (항상 보임) -->
                <div id="dem-legend" style="margin-bottom: 12px;">
                    <div style="display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8; margin-bottom: 4px;">
                        <span>-1m</span>
                        <span>7m</span>
                        <span>16m</span>
                        <span>24m</span>
                        <span>32m+</span>
                    </div>
                    <div style="height: 8px; border-radius: 4px; background: linear-gradient(to right, #0f54e1, #40ff00, #ffbf00, #cf7f2f, #141414);"></div>
                </div>

                <!-- 투명도 슬라이더 -->
                <div id="dem-opacity-container" style="display: none;">
                    <p id="dem-opacity-display" style="margin-bottom:4px; font-size: 11px; color: #94a3b8;">Drape Opacity: 85%</p>
                    <input type="range" id="dem-opacity-slider" min="0" max="1" step="0.05" value="0.85">
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tab-b">Sea Level Rise</button>
            <button class="tab-btn" id="tab-a">NbS Flood Reduction</button>
        </div>

        <div id="content-b" class="tab-content active">
            <div class="control-group scenario-b">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
                    <div>
                        <p style="margin: 0; font-size: 12px; color:#94a3b8; line-height: 1.4;">Simulate severe<br>climate scenarios.</p>
                    </div>
                    <button id="cam-b-btn" class="icon-btn">🎥 View</button>
                </div>
                
                <div style="margin-bottom: 8px;">
                    <p id="slr-value-display" style="margin:0;">Rise: 0.0m</p>
                </div>
                <input type="range" id="slr-slider" min="0" max="5" step="0.5" value="0">
                <div class="slider-labels">
                    <span>0m</span>
                    <span>5m</span>
                </div>
                
                <div style="margin-top: 12px;">
                    <p id="water-opacity-display" style="margin-bottom:4px;">Water Transparency: 60%</p>
                    <input type="range" id="opacity-slider" min="0" max="1" step="0.05" value="0.4">
                </div>

                <button id="export-slr-btn" class="dl-btn" style="display: none;">⬇️ Export Flood Data (GeoJSON)</button>
            </div>
        </div>

        <div id="content-a" class="tab-content">
            <div class="control-group scenario-a">
                <div style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: flex-start;">
                    <p style="margin: 0; font-size: 12px; color:#94a3b8; line-height: 1.4;">Mangrove impact on<br>storm surge.</p>
                    <button id="cam-a-btn" class="icon-btn">🎥 View</button>
                </div>
                
                <div class="toggle-container">
                    <span class="toggle-label">No Mangroves</span>
                    <label class="switch">
                        <input type="checkbox" id="mangrove-toggle">
                        <span class="slider round"></span>
                    </label>
                    <span class="toggle-label">With Mangroves</span>
                </div>
                
                <button id="play-sim-btn" class="glass-btn primary-btn" style="margin-top: 8px;">Play Simulation</button>
            </div>
        </div>
    </div>

</body>
</html>
